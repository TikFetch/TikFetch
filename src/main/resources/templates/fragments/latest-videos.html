<section xmlns:th="http://www.thymeleaf.org" th:fragment="latestVideos(videos)" id="latest-downloads"
         class="latest-section mx-auto max-w-6xl px-6">
    <div class="mb-4 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
        <div>
            <h2 class="text-2xl font-semibold tracking-tight text-slate-950">Latest downloads</h2>
            <p class="text-sm text-slate-600">The newest successfully fetched TikTok videos and photos.</p>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(videos)}"
         class="rounded-lg border border-dashed border-slate-300 bg-white p-8 text-center text-slate-600">
        No successful downloads yet.
    </div>

    <div th:if="${!#lists.isEmpty(videos)}" class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
        <article th:each="video : ${videos}"
                 class="video-card latest-video-card overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm">
            <a th:href="@{/downloads/{id}(id=${video.id})}" class="video-card-media aspect-video bg-slate-100"
               th:attr="aria-label=${video.image} ? 'View photo details' : 'View video details'">
                <img th:if="${video.thumbnailUrl != null}" th:src="${video.thumbnailUrl}" alt=""
                     class="h-full w-full object-cover">
                <div th:if="${video.thumbnailUrl == null}"
                     class="flex h-full items-center justify-center text-sm text-slate-500">No thumbnail
                </div>
                <span class="video-play-overlay">
                    <span class="video-play-button"
                          th:text="${video.image} ? 'View photo' : 'Play video'">Play video</span>
                </span>
            </a>
            <div class="latest-card-body space-y-3 p-4">
                <div class="latest-card-heading">
                    <a th:href="${video.originalUrl}" target="_blank" rel="noopener noreferrer"
                       class="video-title-link line-clamp-2 font-semibold" th:text="${video.title}">TikTok video</a>
                    <a th:if="${video.authorUrl != null}" th:href="${video.authorUrl}" target="_blank"
                       rel="noopener noreferrer" class="mt-1 inline-flex text-sm text-slate-500 hover:text-slate-950"
                       th:text="${video.author ?: 'Unknown creator'}">Creator</a>
                    <p th:if="${video.authorUrl == null}" class="mt-1 text-sm text-slate-500"
                       th:text="${video.author ?: 'Unknown creator'}">Creator</p>
                </div>
                <dl th:if="${!video.image}" class="video-metrics grid grid-cols-2 gap-2 text-slate-600">
                    <div>
                        <dt class="font-medium text-slate-900">Length</dt>
                        <dd th:text="${video.duration}">0:00</dd>
                    </div>
                    <div>
                        <dt class="font-medium text-slate-900">Size</dt>
                        <dd th:text="${video.fileSize}">Unknown</dd>
                    </div>
                    <div>
                        <dt class="font-medium text-slate-900">Likes</dt>
                        <dd th:text="${video.likeCount}">Unknown</dd>
                    </div>
                    <div>
                        <dt class="font-medium text-slate-900">Comments</dt>
                        <dd th:text="${video.commentCount}">Unknown</dd>
                    </div>
                </dl>
                <dl th:if="${video.image}" class="video-metrics photo-metrics grid grid-cols-2 gap-2 text-slate-600">
                    <div>
                        <dt class="font-medium text-slate-900">Likes</dt>
                        <dd th:text="${video.likeCount}">Unknown</dd>
                    </div>
                    <div>
                        <dt class="font-medium text-slate-900">Comments</dt>
                        <dd th:text="${video.commentCount}">Unknown</dd>
                    </div>
                    <div>
                        <dt class="font-medium text-slate-900">Size</dt>
                        <dd th:text="${video.fileSize}">Unknown</dd>
                    </div>
                </dl>
                <div class="latest-card-actions flex">
                    <a th:href="@{/media/videos/{id}(id=${video.id})}"
                       class="inline-flex flex-1 justify-center rounded-md bg-slate-950 px-3 py-2 text-sm font-medium text-white hover:bg-slate-800">Download</a>
                </div>
            </div>
        </article>
    </div>
</section>
