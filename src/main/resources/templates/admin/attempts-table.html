<div xmlns:th="http://www.thymeleaf.org" th:fragment="table(attempts)"
     class="overflow-hidden rounded-lg border border-slate-200 bg-white">
    <div class="border-b border-slate-200 px-4 py-3">
        <h2 class="font-semibold text-slate-950">Attempts</h2>
    </div>
    <div th:if="${#lists.isEmpty(attempts)}" class="p-6 text-sm text-slate-600">No attempts logged yet.</div>
    <div th:if="${!#lists.isEmpty(attempts)}" class="admin-table-scroll overflow-x-auto">
        <table class="min-w-[860px] w-full table-fixed divide-y divide-slate-200 text-sm">
            <thead class="bg-slate-50 text-left text-xs uppercase tracking-wide text-slate-500">
            <tr>
                <th class="w-24 border-r border-slate-200 px-4 py-3">Status</th>
                <th class="w-64 border-r border-slate-200 px-4 py-3">URL</th>
                <th class="border-r border-slate-200 px-4 py-3">Message</th>
                <th class="w-32 border-r border-slate-200 px-4 py-3">IP</th>
                <th class="w-36 px-4 py-3">Time</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="attempt : ${attempts}" class="odd:bg-white even:bg-slate-100">
                <td class="border-r border-slate-200 px-4 py-3" th:text="${attempt.status}">FAILED</td>
                <td class="min-w-0 border-r border-slate-200 px-4 py-3">
                    <a th:if="${attempt.submittedUrl != null}" th:href="${attempt.submittedUrl}"
                       th:title="${attempt.submittedUrl}" target="_blank" rel="noopener noreferrer"
                       class="block truncate text-slate-950 hover:text-blue-600"
                       th:text="${attempt.submittedUrl}">URL</a>
                    <span th:if="${attempt.submittedUrl == null}"
                          class="block truncate text-slate-500">Not available</span>
                </td>
                <td class="min-w-0 border-r border-slate-200 px-4 py-3 text-slate-600">
                    <p class="truncate" th:title="${attempt.message}" th:text="${attempt.message}">Message</p>
                </td>
                <td class="truncate border-r border-slate-200 px-4 py-3 text-slate-600" th:title="${attempt.clientIp}"
                    th:text="${attempt.clientIp}">IP
                </td>
                <td class="whitespace-nowrap px-4 py-3 text-slate-600" th:text="${attempt.createdAt}">Time</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
