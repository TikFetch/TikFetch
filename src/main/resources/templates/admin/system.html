<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: page('System', ~{::content})}">
<main th:fragment="content">
    <div th:replace="~{fragments/admin-shell :: shell('system', ~{::panel})}">
        <div th:fragment="panel" class="space-y-6">
            <div>
                <h1 class="text-2xl font-semibold text-slate-950">System</h1>
                <p class="text-sm text-slate-600">Storage and application configuration snapshot.</p>
            </div>
            <div class="rounded-lg border border-slate-200 bg-white p-5">
                <dl class="grid gap-4 md:grid-cols-2">
                    <div>
                        <dt class="text-sm font-medium text-slate-500">Storage directory</dt>
                        <dd class="mt-1 break-all text-slate-950" th:text="${systemInfo.storageDirectory}">
                            C:/tikfetch/storage
                        </dd>
                    </div>
                    <div>
                        <dt class="text-sm font-medium text-slate-500">Retained successful videos</dt>
                        <dd class="mt-1 text-slate-950" th:text="${app.storage.retainedSuccessfulVideos}">10</dd>
                    </div>
                    <div>
                        <dt class="text-sm font-medium text-slate-500">Total space</dt>
                        <dd class="mt-1 text-slate-950" th:text="${systemInfo.totalSpace}">0 B</dd>
                    </div>
                    <div>
                        <dt class="text-sm font-medium text-slate-500">Usable space</dt>
                        <dd class="mt-1 text-slate-950" th:text="${systemInfo.usableSpace}">0 B</dd>
                    </div>
                </dl>
            </div>
        </div>
    </div>
</main>
</html>
